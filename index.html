<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Sheik | Apostas</title>
    <style>
        :root { 
            --primary: #ffd700; 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #ffffff;
            --btn-text: #000;
        }
        [data-theme="light"] {
            --primary: #b8860b;
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #121212;
            --btn-text: #fff;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .selection-panel { background: var(--card); padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 20px; text-align: center; }
        .selection-panel h2 { margin: 0 0 15px 0; color: var(--primary); font-size: 1.4em; }
        select { width: 100%; padding: 15px; border-radius: 10px; background: #333; color: var(--primary); border: 1px solid var(--primary); font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .info-box { font-size: 0.9em; margin-top: 10px; color: var(--text); opacity: 0.8; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .num { background: #444; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.2s; user-select: none; }
        .num.selected { background: var(--primary); color: #000; font-weight: bold; transform: scale(1.05); }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--primary); color: #000; }
        .btn-reset { background: #ff4d4d; color: white; }
        .btn-theme { background: #555; color: white; flex: 0; padding: 10px; }
        
        #lista { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 20px; max-height: 300px; overflow-y: auto; border: 1px solid #444; }
        .jogo-item { padding: 8px 0; border-bottom: 1px solid #444; font-size: 0.9em; }
        #contador-container { text-align: center; margin: 10px 0; font-weight: bold; color: var(--primary); font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>👑 Bolão do Sheik</h1>
        <button class="btn-theme" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="selection-panel">
        <h2>Escolha a Modalidade</h2>
        <select id="modalidade" onchange="resetarGrid()">
            <option value="6,60" data-info="6 números (1 a 60)">Mega-Sena</option>
            <option value="15,25" data-info="15 números (1 a 25)">Lotofácil</option>
            <option value="5,80" data-info="5 números (1 a 80)">Quina</option>
        </select>
        <div id="info-box" class="info-box">Carregando...</div>
    </div>

    <div id="contador-container">
        Selecionados: <span id="contador">0</span> / <span id="total-necessario">6</span>
    </div>

    <div id="grid" class="grid"></div>

    <div class="actions">
        <button class="btn-add" onclick="adicionarJogo()">+ Adicionar Jogo</button>
        <button class="btn-reset" onclick="limparTudo()">🗑️ Resetar</button>
    </div>

    <h3>Seus Jogos (<span id="count">0</span>)</h3>
    <div id="lista">Nenhum jogo selecionado.</div>
    
    <button onclick="enviarWhatsApp()" style="background: #25d366; color: white; width: 100%; margin-top: 20px; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px;">
        Enviar Bolão para o WhatsApp
    </button>

    <a href="https://loterias.caixa.gov.br/Paginas/default.aspx" target="_blank" 
       style="display: block; text-align: center; margin-top: 10px; padding: 15px; background: #ddd; color: #000; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid var(--primary);">
        🔍 Conferir Resultados Oficiais
    </a>
</div>

<script>
    let selecionados = [];
    let todosJogos = [];

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        body.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
    }

    function resetarGrid() {
        selecionados = [];
        const select = document.getElementById('modalidade');
        const config = select.value.split(',');
        const limite = parseInt(config[0]);
        const totalNumeros = parseInt(config[1]);
        
        document.getElementById('total-necessario').innerText = limite;
        document.getElementById('contador').innerText = "0";
        document.getElementById('info-box').innerHTML = `<strong>Regra:</strong> Escolha <b>${limite} números</b> entre 1 e ${totalNumeros}.`;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 1; i <= totalNumeros; i++) {
            let b = document.createElement('div');
            b.className = 'num';
            b.innerText = i;
            b.onclick = () => toggle(i, b);
            grid.appendChild(b);
        }
    }

    function toggle(n, el) {
        const limite = parseInt(document.getElementById('modalidade').value.split(',')[0]);
        if (selecionados.includes(n)) {
            selecionados = selecionados.filter(x => x !== n);
            el.classList.remove('selected');
        } else if (selecionados.length < limite) {
            selecionados.push(n);
            el.classList.add('selected');
        }
        document.getElementById('contador').innerText = selecionados.length;
    }

    function adicionarJogo() {
        const select = document.getElementById('modalidade');
        const limite = parseInt(select.value.split(',')[0]);
        if (selecionados.length === limite) {
            todosJogos.push({ 
                mod: select.options[select.selectedIndex].text, 
                nums: [...selecionados].sort((a,b) => a-b) 
            });
            selecionados = [];
            document.querySelectorAll('.num').forEach(el => el.classList.remove('selected'));
            document.getElementById('contador').innerText = "0";
            document.getElementById('count').innerText = todosJogos.length;
            atualizarLista();
        } else { alert(`Selecione ${limite} números para esta modalidade.`); }
    }

    function limparTudo() {
        if(confirm("Deseja realmente apagar todos os jogos selecionados?")) {
            todosJogos = [];
            document.getElementById('lista').innerHTML = "Nenhum jogo selecionado.";
            document.getElementById('count').innerText = "0";
        }
    }

    function atualizarLista() {
        document.getElementById('lista').innerHTML = todosJogos.map((j, i) => 
            `<div class="jogo-item"><b>J${i+1} (${j.mod}):</b> ${j.nums.join(', ')}</div>`
        ).join('');
    }

    function enviarWhatsApp() {
        if (todosJogos.length === 0) return alert("Adicione pelo menos um jogo antes de enviar!");
        let msg = "👑 *Bolão do Sheik*%0A%0A" + todosJogos.map((j, i) => `J${i+1} (${j.mod}): ${j.nums.join(', ')}`).join('%0A');
        window.open(`https://wa.me/5512991599185?text=${msg}`, '_blank');
    }

    resetarGrid();
</script>
</body>
</html>
