<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Sheik | Apostas</title>
    <style>
        :root { --primary: #ffd700; --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        [data-theme="light"] { --primary: #b8860b; --bg: #f4f4f4; --card: #ffffff; --text: #121212; }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .panel { background: var(--card); padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 15px; }
        select { width: 100%; padding: 15px; border-radius: 10px; background: #333; color: var(--primary); border: 1px solid var(--primary); font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .info-text { font-size: 14px; margin-top: 10px; color: var(--primary); text-align: center; }
        .counter { text-align: center; font-size: 18px; font-weight: bold; margin: 10px 0; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .num { background: #444; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.2s; user-select: none; }
        .num.selected { background: var(--primary); color: #000; font-weight: bold; transform: scale(1.05); }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--primary); color: #000; }
        .btn-reset { background: #ff4d4d; color: white; }
        
        #lista { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 20px; max-height: 250px; overflow-y: auto; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>👑 Bolão do Sheik</h1>
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:24px; cursor:pointer;">🌓</button>
    </div>

    <div class="panel">
        <select id="modalidade" onchange="resetarGrid()">
            <option value="6,60" data-regra="Selecione 6 números entre 1 e 60.">Mega-Sena</option>
            <option value="15,25" data-regra="Selecione 15 números entre 1 e 25.">Lotofácil</option>
            <option value="5,80" data-regra="Selecione 5 números entre 1 e 80.">Quina de São João</option>
        </select>
        <div id="regra-text" class="info-text">Selecione uma modalidade</div>
    </div>

    <div class="counter">
        Selecionados: <span id="contador">0</span> / <span id="limite">0</span>
    </div>

    <div id="grid" class="grid"></div>

    <div class="actions">
        <button class="btn-add" onclick="adicionarJogo()">+ Adicionar Jogo</button>
        <button class="btn-reset" onclick="limparTudo()">🗑️ Resetar</button>
    </div>

    <div id="lista">Nenhum jogo selecionado.</div>
    
    <button onclick="enviarWhatsApp()" style="background: #25d366; color: white; width: 100%; margin-top: 15px; padding: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px;">
        Enviar Bolão via WhatsApp
    </button>

    <!-- Anúncio de Afiliado -->
    <div style="margin-top: 30px; text-align: center;">
        <a href="SEU_LINK_DE_AFILIADO_AQUI" target="_blank">
            <img src="https://res.cloudinary.com/dxpygpngo/image/upload/v1782150585/Design_sem_nome_hoqplk.png" 
                 alt="Anúncio Bolão do Sheik" 
                 style="max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        </a>
    </div>
</div>

<script>
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
    
    let selecionados = [];
    let todosJogos = [];

    function resetarGrid() {
        selecionados = [];
        const select = document.getElementById('modalidade');
        const config = select.value.split(',');
        const limite = parseInt(config[0]);
        const total = parseInt(config[1]);
        
        document.getElementById('limite').innerText = limite;
        document.getElementById('contador').innerText = "0";
        document.getElementById('regra-text').innerText = select.options[select.selectedIndex].dataset.regra;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 1; i <= total; i++) {
            let b = document.createElement('div');
            b.className = 'num';
            b.innerText = i;
            b.onclick = function() {
                if (selecionados.includes(i)) {
                    selecionados = selecionados.filter(x => x !== i);
                    this.classList.remove('selected');
                } else if (selecionados.length < limite) {
                    selecionados.push(i);
                    this.classList.add('selected');
                }
                document.getElementById('contador').innerText = selecionados.length;
            };
            grid.appendChild(b);
        }
    }

    function adicionarJogo() {
        const select = document.getElementById('modalidade');
        const mod = select.options[select.selectedIndex].text;
        const limite = parseInt(select.value.split(',')[0]);
        
        if (selecionados.length === limite) {
            todosJogos.push({mod, nums: [...selecionados].sort((a,b) => a-b)});
            selecionados = [];
            document.querySelectorAll('.num').forEach(el => el.classList.remove('selected'));
            document.getElementById('contador').innerText = "0";
            document.getElementById('lista').innerHTML = todosJogos.map((j, i) => `<div><b>${i+1}. ${j.mod}:</b> ${j.nums.join(', ')}</div>`).join('<hr>');
        } else { alert("Você precisa selecionar " + limite + " números!"); }
    }

    function limparTudo() { 
        if(confirm("Deseja apagar todos os jogos?")) {
            todosJogos = []; 
            document.getElementById('lista').innerHTML = "Nenhum jogo selecionado."; 
        }
    }

    function enviarWhatsApp() {
        if (todosJogos.length === 0) return alert("Adicione jogos primeiro!");
        let msg = "👑 *Bolão do Sheik*%0A%0A" + todosJogos.map((j, i) => `J${i+1} (${j.mod}): ${j.nums.join(', ')}`).join('%0A');
        window.open('https://wa.me/5512991599185?text=' + encodeURIComponent(msg), '_blank');
    }

    resetarGrid();
</script>
</body>
</html>
