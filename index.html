<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão do Sheik</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #ffd700; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 400px; margin: auto; }
        button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; }
        .num { background: #333; color: white; }
        .num.selected { background: #ffd700; color: #000; }
        #lista { margin: 20px 0; background: #fff; color: #000; padding: 10px; border-radius: 5px; text-align: left; }
    </style>
</head>
<body>

    <h1>👑 Bolão do Sheik</h1>
    <div class="grid" id="grid"></div>
    <br>
    <button onclick="adicionarJogo()" style="background: #28a745; color: white; font-weight: bold;">Adicionar Jogo (6 números)</button>
    
    <h3>Jogos Selecionados:</h3>
    <div id="lista">Nenhum jogo adicionado.</div>
    <button onclick="enviarWhatsApp()" style="background: #25d366; color: white; padding: 15px; width: 100%; max-width: 400px; font-size: 18px;">Enviar para o WhatsApp</button>

    <script>
        let selecionados = [];
        let todosJogos = [];

        // Criar números de 1 a 60
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 60; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num';
            btn.onclick = () => toggleNumero(i, btn);
            grid.appendChild(btn);
        }

        function toggleNumero(n, btn) {
            if (selecionados.includes(n)) {
                selecionados = selecionados.filter(x => x !== n);
                btn.classList.remove('selected');
            } else if (selecionados.length < 6) {
                selecionados.push(n);
                btn.classList.add('selected');
            }
        }

        function adicionarJogo() {
            if (selecionados.length === 6) {
                todosJogos.push([...selecionados.sort((a,b) => a-b)]);
                selecionados = [];
                document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
                atualizarLista();
            } else { alert("Selecione 6 números!"); }
        }

        function atualizarLista() {
            document.getElementById('lista').innerHTML = todosJogos.map((j, i) => `Jogo ${i+1}: ${j.join(', ')}`).join('<br>');
        }

        function enviarWhatsApp() {
            if (todosJogos.length === 0) return alert("Adicione pelo menos um jogo!");
            let msg = "Olá Sheik! Segue meu bolão:%0A" + todosJogos.map((j, i) => `J${i+1}: ${j.join(', ')}`).join('%0A');
            window.open(`https://wa.me/5512991599185?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
