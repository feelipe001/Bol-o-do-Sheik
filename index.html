<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Sheik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .num { background: #333; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; }
        .num.selected { background: #ffd700; color: #000; font-weight: bold; }
        #lista { background: #1e1e1e; padding: 15px; border-radius: 8px; max-height: 300px; overflow-y: auto; }
        .btn-green { background: #25d366; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 Bolão do Sheik</h1>
    <select id="modalidade" onchange="resetarGrid()">
        <option value="6,60">Mega-Sena (6 números)</option>
        <option value="15,25">Lotofácil (15 números)</option>
        <option value="5,80">Quina (5 números)</option>
    </select>

    <div id="grid" class="grid"></div>
    <button onclick="adicionarJogo()" class="btn-green">Adicionar Jogo</button>
    
    <h3>Jogos (Total: <span id="count">0</span>)</h3>
    <div id="lista">Nenhum jogo.</div>
    <button onclick="enviarWhatsApp()" style="background: #007bff; color: white;">Enviar via WhatsApp</button>
</div>

<script>
    let selecionados = [];
    let todosJogos = [];

    function resetarGrid() {
        selecionados = [];
        const config = document.getElementById('modalidade').value.split(',');
        const totalNumeros = parseInt(config[1]);
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 1; i <= totalNumeros; i++) {
            let b = document.createElement('div');
            b.className = 'num';
            b.innerText = i;
            b.onclick = () => toggle(i, b);
            grid.appendChild(b);
        }
    }

    function toggle(n, el) {
        const limite = parseInt(document.getElementById('modalidade').value.split(',')[0]);
        if (selecionados.includes(n)) {
            selecionados = selecionados.filter(x => x !== n);
            el.classList.remove('selected');
        } else if (selecionados.length < limite) {
            selecionados.push(n);
            el.classList.add('selected');
        }
    }

    function adicionarJogo() {
        const limite = parseInt(document.getElementById('modalidade').value.split(',')[0]);
        if (selecionados.length === limite) {
            const mod = document.getElementById('modalidade').options[document.getElementById('modalidade').selectedIndex].text;
            todosJogos.push({ mod, nums: [...selecionados].sort((a,b) => a-b) });
            selecionados = [];
            document.querySelectorAll('.num').forEach(el => el.classList.remove('selected'));
            document.getElementById('count').innerText = todosJogos.length;
            atualizarLista();
        } else { alert("Selecione " + limite + " números!"); }
    }

    function atualizarLista() {
        document.getElementById('lista').innerHTML = todosJogos.map((j, i) => 
            `<div><b>${j.mod}</b>: ${j.nums.join(', ')}</div><hr>`
        ).join('');
    }

    function enviarWhatsApp() {
        if (todosJogos.length === 0) return alert("Adicione jogos!");
        let msg = "Olá Sheik! Segue meu bolão:%0A" + todosJogos.map(j => `${j.mod}: ${j.nums.join(', ')}`).join('%0A');
        window.open(`https://wa.me/5512991599185?text=${msg}`, '_blank');
    }

    resetarGrid();
</script>
</body>
</html>
